name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: L'étape 1 - Récupérer le code du dépôt
      uses: actions/checkout@v3

    - name: L'étape 2 - Configurer l'environnement Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: L'étape 3 - Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: L'étape 4 - Exécuter les tests Django
      run: |
        python manage.py test